<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovci pokladu staré Prahy</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top">
    <h1 id="gameTitle">Lovci pokladu staré Prahy</h1>

    <div class="badges">
      <div class="badge" id="dayBadge">Den 1</div>
      <div class="badge" id="progressBadge">Splněno 0 / 0</div>
      <div class="badge" id="cluesBadge">Indicie 0</div>
    </div>

    <div class="modes">
      <button id="btnPlayer" class="topBtn active">Hráč</button>
      <button id="btnLeader" class="topBtn">Vedoucí</button>
      <button id="btnAllDays" class="topBtn">Všechny dny</button>
    </div>

    <div class="legend">
      <span class="pill"><i class="line walk"></i>Pěšky</span>
      <span class="pill"><i class="line tram"></i>Tramvaj</span>
      <span class="pill"><i class="line metro"></i>Metro</span>
      <span class="pill"><i class="line boat"></i>Loď</span>
      <span class="pill"><i class="line bolt"></i>Bolt</span>
    </div>

    <div class="actions">
      <button id="btnNextDay" class="mainBtn">Další den</button>
      <button id="btnHints" class="mainBtn">Indicie</button>
      <button id="btnFinale" class="mainBtn">Finále</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
