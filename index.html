<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lovci pokladu staré Prahy</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css?v=20260328-1" />
</head>
<body>
  <div class="top-panel">
    <h1 id="gameTitle">Lovci pokladu staré Prahy</h1>

    <div class="hud-row">
      <div id="dayBadge">Den 1</div>
      <div id="progressBadge">Splněno 0 / 5</div>
      <div id="cluesBadge">Indicie 0</div>
    </div>

    <div class="hud-row">
      <button id="btnPlayer" type="button" class="mode-btn active">Hráč</button>
      <button id="btnLeader" type="button" class="mode-btn">Vedoucí</button>
      <button id="btnAllDays" type="button" class="mode-btn">Všechny dny</button>
    </div>

    <div class="hud-row legend-row">
      <div class="legend-item" id="legendWalk">
        <span class="legend-line walk"></span>
        <span>Pěšky</span>
      </div>

      <div class="legend-item" id="legendTram">
        <span class="legend-line tram"></span>
        <span>Tramvaj</span>
      </div>

      <div class="legend-item" id="legendMetro">
        <span class="legend-line metro"></span>
        <span>Metro</span>
      </div>

      <div class="legend-item" id="legendBoat">
        <span class="legend-line boat"></span>
        <span>Loď</span>
      </div>

      <div class="legend-item" id="legendBolt">
        <span class="legend-line bolt"></span>
        <span>Bolt</span>
      </div>
    </div>

    <div class="hud-row action-row">
      <button id="btnPrevDay" type="button" class="action-btn">Předchozí den</button>
      <button id="btnNextDay" type="button" class="action-btn">Další den</button>
      <button id="btnHints" type="button" class="action-btn">Indicie</button>
      <button id="btnFinale" type="button" class="action-btn">Finále</button>
    </div>
  </div>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js?v=20260328-1"></script>
</body>
</html>
